name: Android CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  page_build:
  release:
    types: [created]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
        
    - name: Setup Gradle 8.7
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.7'
        cache-read-only: false
        
    - name: Cache Gradle dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
          .gradle
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
          
    - name: Make gradlew executable
      run: chmod +x ./gradlew
      
    - name: Run unit tests
      run: ./gradlew testFreeDebugUnitTest --stacktrace --no-daemon
      
    - name: Build with Gradle
      run: ./gradlew assembleFreeDebug assemblePlayDebug --stacktrace --no-daemon
