name: Android CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  page_build:
  release:
    types: [created]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
        
    - name: Cache Gradle dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
          
    - name: Make gradlew executable
      run: chmod +x ./gradlew
      
    - name: Debug environment
      run: |
        echo "Java version:"
        java -version
        echo "Gradle version:"
        ./gradlew --version
        echo "Android SDK:"
        echo $ANDROID_HOME
        ls -la $ANDROID_HOME || echo "Android SDK not found"
      
    - name: Run unit tests
      run: ./gradlew testFreeDebugUnitTest --stacktrace --no-daemon
      
    - name: Build with Gradle
      run: ./gradlew assembleFreeDebug assemblePlayDebug --stacktrace --no-daemon
