name: Android CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
          
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Run tests
      run: ./gradlew testFreeDebugUnitTest
      
    - name: Build Free Debug APK
      run: ./gradlew assembleFreeDebug
      
    - name: Build Play Debug APK
      run: ./gradlew assemblePlayDebug
      
    - name: Upload Free APK
      uses: actions/upload-artifact@v4
      with:
        name: NoNameRadio-free-debug
        path: app/build/outputs/apk/free/debug/*.apk
        
    - name: Upload Play APK
      uses: actions/upload-artifact@v4
      with:
        name: NoNameRadio-play-debug
        path: app/build/outputs/apk/play/debug/*.apk

  release:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
          
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Build Release APKs
      run: |
        ./gradlew assembleFreeRelease
        ./gradlew assemblePlayRelease
        
    - name: Sign APK
      uses: r0adkll/sign-android-release@v1
      if: env.KEYSTORE_FILE != ''
      with:
        releaseDirectory: app/build/outputs/apk/free/release
        signingKeyBase64: ${{ secrets.KEYSTORE_FILE }}
        alias: ${{ secrets.KEY_ALIAS }}
        keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
        keyPassword: ${{ secrets.KEY_PASSWORD }}
      env:
        KEYSTORE_FILE: ${{ secrets.KEYSTORE_FILE }}
        
    - name: Upload Release APKs to Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          app/build/outputs/apk/free/release/*.apk
          app/build/outputs/apk/play/release/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}